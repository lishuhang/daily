---
layout: base
---

<div class="article-layout">
  <!-- 左侧栏：题图 + 迷你日历 + 其它日期 + 分享 -->
  <aside class="article-sidebar">
    {% if page.image %}
    <div class="article-cover">
      <img src="https://images.weserv.nl/?url={{ page.image | url_encode }}&w=640&h=640&output=jpg&q=80&fit=cover"
           alt="{{ page.title }}" loading="lazy" data-original="{{ page.image }}">
    </div>
    {% endif %}
    <div class="mini-calendar-wrap" id="miniCalWrap">
      <div class="mini-cal-header" id="miniCalHeader"></div>
      <div class="mini-calendar" id="miniCalendar"></div>
    </div>
    <!-- 横屏显示的操作栏，竖屏隐藏 -->
    <div class="article-actions article-sidebar-actions">
      <a href="{{ '/' | relative_url }}" class="back-link">&larr; 其它日期</a>
      {% include share.html %}
    </div>
  </aside>

  <!-- 右侧主体 -->
  <div class="article-body">
    <header class="article-header">
      <h1 class="article-title">{{ page.title }}</h1>
      <div class="article-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y年%m月%d日" }}</time>
        {% if page.tags and page.tags.size > 0 %}
        <span class="meta-sep">·</span>
        <span class="article-tags">
          {% for tag in page.tags %}
          <span class="article-tag">#{{ tag }}</span>
          {% endfor %}
        </span>
        {% endif %}
      </div>
    </header>

    <article class="article-content">
      {{ content }}
    </article>

    <!-- 竖屏显示的操作栏，横屏隐藏 -->
    <div class="article-actions article-body-actions">
      <a href="{{ '/' | relative_url }}" class="back-link">&larr; 其它日期</a>
      {% include share.html %}
    </div>
  </div>
</div>
